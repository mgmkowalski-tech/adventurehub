<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f7f7fa">
<title>Outsy · adventure hub</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Outsy">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root{
    --glow-rgb:229,67,155;             /* subtle background glow (magenta default) */
    --ink:#262b3a;                     /* main text */
    --muted:rgba(38,43,58,.55);        /* secondary text */
    --faint:rgba(38,43,58,.40);        /* tertiary text / placeholders */
    --accent:#9aa0b0;                  /* neutral icon accent (plus etc.) */
    --star-off:#CDD2DC;                /* not voted */
    --star-kasia:#E5439B;              /* magenta (Kasia) */
    --star-michal:#12B5C9;             /* cyan (Michał) */
    --glass:rgba(255,255,255,0.55);    /* frosted card on light */
    --glass-line:rgba(255,255,255,0.85);
    --btn:rgba(20,24,40,.06);          /* light neutral button */
    --btn-strong:rgba(20,24,40,.11);
    --field:rgba(255,255,255,.60);
    --field-line:rgba(20,24,40,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:inherit;}
  html,body{height:100%;overscroll-behavior-y:contain;}
  body{
    font-family:'Poppins',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    color:var(--ink);overflow:hidden;
    background:
      radial-gradient(125% 85% at 12% -12%, rgba(var(--glow-rgb),.22), transparent 55%),
      radial-gradient(120% 90% at 105% 112%, rgba(var(--glow-rgb),.16), transparent 55%),
      linear-gradient(160deg,#fbfbfd 0%,#eceef3 100%);
    -webkit-text-size-adjust:100%;
    transition:background .6s ease;
  }
  .app{
    position:relative;width:100%;max-width:480px;height:100%;margin:0 auto;overflow:hidden;
  }
  .screen{position:absolute;inset:0;display:none;flex-direction:column;z-index:1;}
  .screen.active{display:flex;}

  /* glass primitive */
  .glass{
    background:var(--glass);
    backdrop-filter:blur(12px) saturate(135%);
    -webkit-backdrop-filter:blur(12px) saturate(135%);
    border:1px solid var(--glass-line);
    box-shadow:inset 0 1px 1px rgba(255,255,255,.75), 0 10px 28px rgba(40,44,70,.10);
  }

  /* ================= START SCREEN ================= */
  #bubbles{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:1;transition:opacity .8s ease;}
  .bubble{
    position:absolute;border-radius:50%;
    background:radial-gradient(circle at 34% 30%, rgba(255,255,255,.75), rgba(var(--glow-rgb),.30) 55%, rgba(var(--glow-rgb),.16) 100%);
    border:1px solid rgba(255,255,255,.65);
    box-shadow:inset 0 2px 8px rgba(255,255,255,.6), 0 8px 22px rgba(var(--glow-rgb),.16);
    will-change:transform;
  }
  .settings-btn{
    position:absolute;top:30px;left:24px;z-index:5;
    width:36px;height:36px;border:none;background:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .settings-btn svg{width:28px;height:28px;}
  .hero-center{
    position:relative;z-index:2;flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:0 24px;
  }
  .h-adv{font-size:48px;font-weight:700;line-height:1;letter-spacing:-1px;}
  .h-hub{font-size:104px;font-weight:800;line-height:.92;letter-spacing:-3px;margin-top:-2px;}
  .h-sub{position:absolute;top:62%;font-size:17px;font-weight:500;color:var(--faint);}
  .brand-mark{width:120px;height:120px;display:block;margin:0 auto 16px;
    transform-origin:center;animation:heartbeat 1.6s ease-in-out infinite;will-change:transform;}
  @keyframes heartbeat{
    0%{transform:scale(1);}
    12%{transform:scale(1.13);}
    24%{transform:scale(1);}
    36%{transform:scale(1.13);}
    52%{transform:scale(1);}
    100%{transform:scale(1);}
  }
  .brand-name{font-family:'Poppins',sans-serif;font-size:52px;font-weight:800;letter-spacing:-1.5px;color:var(--ink);text-align:center;line-height:1;}
  .brand-sub{font-size:16px;font-weight:500;color:var(--muted);text-align:center;letter-spacing:.4px;margin-top:2px;}
  .wordmark{display:block;margin:0 auto;width:172px;height:66px;color:var(--ink);}
  .wordmark-sm{width:86px;height:33px;flex:0 0 auto;color:var(--ink);}
  .list-logo{display:flex;align-items:center;gap:10px;padding:16px 18px 2px;flex:0 0 auto;}
  .sygnet-sm{width:34px;height:34px;flex:0 0 auto;}
  .list-logo-txt .ln{font-size:20px;font-weight:800;color:var(--ink);line-height:1;letter-spacing:-.5px;}
  .list-logo-txt .ls{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:.4px;margin-top:1px;}
  .start-btn-wrap{position:relative;z-index:2;padding:0 18px 40px;}
  .start-btn{
    width:100%;border:none;cursor:pointer;color:var(--ink);
    font-family:inherit;font-size:18px;font-weight:600;
    padding:24px 0;border-radius:28px;
    background:var(--glass);
    backdrop-filter:blur(12px) saturate(135%);
    -webkit-backdrop-filter:blur(12px) saturate(135%);
    border:1px solid var(--glass-line);
    box-shadow:inset 0 1px 1px rgba(255,255,255,.75), 0 10px 28px rgba(40,44,70,.14);
    transition:transform .12s;
  }
  .start-btn:active{transform:scale(.98);}

  /* options panel */
  .options{
    position:absolute;top:0;left:0;right:0;z-index:6;
    margin:0;padding:64px 18px 26px;
    border-radius:0 0 32px 32px;
    transform:translateY(-105%);transition:transform .4s cubic-bezier(.22,1,.36,1);
  }
  .options.open{transform:translateY(0);}
  .opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .opt-label{font-size:12px;font-weight:500;color:var(--muted);margin-bottom:14px;}
  .swatches{display:flex;flex-direction:column;gap:12px;}
  .swatch{
    width:33px;height:33px;border-radius:10px;cursor:pointer;border:2px solid transparent;
    outline:2px solid transparent;outline-offset:2px;transition:outline-color .15s;
  }
  .swatch.sel{outline-color:var(--ink);}
  .users{display:flex;flex-direction:column;gap:12px;}
  .user{display:flex;align-items:center;gap:12px;cursor:pointer;}
  .user .ic{
    width:33px;height:33px;border-radius:10px;background:rgba(0,0,0,.25);
    display:flex;align-items:center;justify-content:center;border:2px solid transparent;
    transition:border-color .15s;
  }
  .user.sel .ic{border-color:var(--ink);}
  .user .ic svg{width:18px;height:18px;}
  .user .nm{font-size:17px;font-weight:600;color:var(--ink);}
  .save-opt{
    margin-top:22px;display:inline-block;border:none;cursor:pointer;color:var(--ink);font-family:inherit;
    font-size:15px;font-weight:600;padding:11px 26px;border-radius:11px;
    background:var(--btn);border:none;
  }
  .save-opt:active{transform:scale(.97);}

  /* ================= LIST SCREEN ================= */
  #list{padding:0;}
  .list-top{display:flex;justify-content:space-between;align-items:center;padding:20px 18px 0;flex:0 0 auto;}
  .gear{width:34px;height:34px;border:none;background:none;cursor:pointer;padding:0;
    display:flex;align-items:center;justify-content:center;}
  .gear svg{width:26px;height:26px;}
  .gear:active{transform:scale(.92);}
  .user-badge{display:flex;align-items:center;gap:9px;}
  .user-badge .nm{font-size:14px;font-weight:600;color:var(--ink);}
  .user-badge .ic{width:34px;height:34px;border-radius:10px;background:rgba(0,0,0,.25);
    display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.10);}
  .user-badge .ic svg{width:18px;height:18px;}
  .discover-btn{display:flex;align-items:center;gap:7px;cursor:pointer;color:var(--ink);font-weight:600;font-size:14px;
    padding:7px 13px;border-radius:12px;background:var(--btn);transition:background .15s, transform .12s;}
  .discover-btn.on{background:var(--btn-strong);}
  .discover-btn:active{transform:scale(.96);}
  .disc-ic{position:relative;width:18px;height:18px;flex:0 0 auto;}
  .disc-ic svg{position:absolute;inset:0;width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2;
    transition:opacity .25s ease, transform .25s ease;}
  .ic-close{opacity:0;transform:rotate(-90deg) scale(.5);}
  .discover-btn.on .ic-search{opacity:0;transform:rotate(90deg) scale(.5);}
  .discover-btn.on .ic-close{opacity:1;transform:none;}
  .discover-view{display:none;flex:1;flex-direction:column;min-height:0;padding:10px 18px 18px;}
  .search-row{display:flex;gap:8px;margin-bottom:10px;}
  .place-search{width:100%;font-family:inherit;font-size:15px;padding:13px 15px;border-radius:14px;
    border:1px solid rgba(0,0,0,.06);background:rgba(0,0,0,.08);color:var(--ink);outline:none;margin-bottom:10px;
    box-shadow:inset 0 2px 7px rgba(0,0,0,.14);}
  .place-search::placeholder{color:var(--faint);}
  .search-row .place-search{flex:1;margin-bottom:0;}
  .search-go{flex:0 0 auto;width:48px;border:none;cursor:pointer;border-radius:14px;
    background:linear-gradient(135deg, rgba(var(--glow-rgb),1), rgba(var(--glow-rgb),.72));
    display:flex;align-items:center;justify-content:center;}
  .search-go svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;}
  .search-go:active{transform:scale(.95);}
  .disc-close{flex:0 0 auto;width:46px;border:none;cursor:pointer;border-radius:14px;background:rgba(0,0,0,.08);
    display:flex;align-items:center;justify-content:center;}
  .disc-close svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2.2;}
  .disc-close:active{transform:scale(.95);}
  .view-seg{margin:16px 18px 8px;}
  .view-seg .cat-thumb{width:calc((100% - 10px)/2);}
  .cat-seg#catTabs{margin-top:0;}
  .place-search:disabled,.search-go:disabled{opacity:.5;cursor:not-allowed;}
  .map-limit{display:none;background:rgba(229,67,155,.12);border:1px solid rgba(229,67,155,.32);
    color:#b03a6e;font-size:13px;font-weight:600;padding:10px 12px;border-radius:12px;margin-bottom:10px;text-align:center;}
  #map{flex:1;min-height:220px;border-radius:20px;overflow:hidden;background:rgba(255,255,255,.4);}
  .map-label{ text-shadow:-1.2px -1.2px 0 #fff,1.2px -1.2px 0 #fff,-1.2px 1.2px 0 #fff,1.2px 1.2px 0 #fff,0 0 3px #fff; }
  .map-add-btn{display:none;margin-top:12px;width:100%;border:none;cursor:pointer;color:#fff;font-family:inherit;
    font-size:16px;font-weight:700;padding:15px;border-radius:16px;
    background:linear-gradient(120deg, rgba(var(--glow-rgb),1), rgba(var(--glow-rgb),.72));
    box-shadow:0 10px 24px rgba(var(--glow-rgb),.30);}
  .map-add-btn .p{font-size:19px;margin-right:4px;}
  .map-add-btn:active{transform:scale(.98);}
  .map-view-btn{margin-top:12px;width:100%;border:none;cursor:pointer;font-family:inherit;
    font-size:14px;font-weight:600;color:var(--ink);padding:12px;border-radius:14px;background:var(--btn);}
  .map-view-btn:active{transform:scale(.98);}
  /* place panel (Google-Maps-like sheet) */
  .place-panel{position:absolute;left:0;right:0;bottom:0;z-index:6;
    background:rgba(255,255,255,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-radius:24px 24px 0 0;box-shadow:0 -10px 34px rgba(40,44,70,.20);
    padding:8px 18px calc(16px + env(safe-area-inset-bottom));
    transform:translateY(112%);transition:transform .36s cubic-bezier(.22,1,.36,1);
    max-height:78%;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .place-panel.open{transform:translateY(0);}
  .pp-photos{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin:6px 0 12px;-webkit-overflow-scrolling:touch;}
  .pp-photos:empty{display:none;}
  .pp-photo{height:130px;width:auto;border-radius:14px;flex:0 0 auto;object-fit:cover;background:#eee;}
  .pp-name{font-size:19px;font-weight:800;color:var(--ink);line-height:1.15;}
  .pp-meta{font-size:13px;color:var(--muted);margin-top:4px;}
  .pp-addr{font-size:13px;color:rgba(38,43,58,.7);margin-top:6px;}
  .pp-actions{display:flex;gap:10px;margin-top:14px;}
  .pp-actions .map-view-btn,.pp-actions .map-add-btn{display:block;margin-top:0;flex:1;width:auto;}
  .list-head{
    display:grid;grid-template-columns:1fr auto;align-items:center;
    padding:8px 40px 10px;column-gap:12px;flex:0 0 auto;
  }
  .list-head .h-act{font-size:13px;font-weight:500;color:var(--ink);}
  .list-head .h-col{font-size:13px;font-weight:500;color:var(--ink);text-align:right;}
  .cat-seg{position:relative;display:flex;margin:16px 18px 14px;padding:5px;border-radius:16px;
    background:rgba(20,24,40,.06);flex:0 0 auto;}
  .cat-thumb{position:absolute;top:5px;left:5px;bottom:5px;width:calc((100% - 10px)/3);border-radius:12px;
    z-index:0;transition:transform .34s cubic-bezier(.34,1.4,.6,1);}
  .cat-seg[data-active="1"] .cat-thumb{transform:translateX(100%);}
  .cat-seg[data-active="2"] .cat-thumb{transform:translateX(200%);}
  .cat-opt{position:relative;z-index:1;flex:1;border:none;background:none;cursor:pointer;font-family:inherit;
    font-size:13px;font-weight:600;color:var(--muted);padding:10px 4px;transition:color .2s;}
  .cat-opt.active{color:var(--ink);}
  .scroll{flex:1;overflow-y:auto;padding:0 18px 40px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
  .scroll::-webkit-scrollbar{display:none;}

  /* blob/goo layer behind the cards */
  #cards{position:relative;}
  #aura{position:absolute;inset:0;z-index:0;filter:url(#goo);pointer-events:none;}
  .aura-blob{position:absolute;background:rgba(var(--glow-rgb),.12);border-radius:16px;}

  .card{
    position:relative;z-index:1;
    border-radius:16px;margin-bottom:13px;overflow:hidden;
    transition:background .25s ease, box-shadow .4s ease, transform .42s cubic-bezier(.34,1.3,.5,1);
  }
  .card.open{
    box-shadow:inset 0 1px 1px rgba(255,255,255,.75), 0 18px 40px rgba(40,44,70,.16);
    transform:scale(1.012);
  }
  .card:active{transform:scale(.992);}
  .card.open:active{transform:scale(1.004);}
  .card-row{
    display:grid;grid-template-columns:1fr auto;align-items:center;
    min-height:76px;padding:0 22px;column-gap:12px;
  }
  .row-right{display:flex;justify-content:flex-end;align-items:center;}
  .c-left{display:flex;align-items:center;gap:14px;min-width:0;}
  .plus-ic{
    width:32px;height:32px;border:1.5px solid rgba(var(--glow-rgb),.35);border-radius:9px;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgb(var(--glow-rgb));
  }
  .plus-ic svg{width:18px;height:18px;display:block;}
  .plus-ic .v-line{transition:opacity .2s ease, transform .2s ease;transform-origin:center;}
  .card.minus .plus-ic .v-line{opacity:0;transform:rotate(90deg);}
  .c-name{font-size:13px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;}
  .star-btn{display:flex;align-items:center;justify-content:center;cursor:pointer;height:76px;}
  .star{width:28px;height:28px;display:block;}
  .star path{fill:var(--star-off);transition:fill .15s;}
  .star.on path{fill:var(--accent);}
  .star.on.k path{fill:var(--star-kasia);}   /* Kasia = magenta */
  .star.on.m path{fill:var(--star-michal);}  /* Michał = cyan */
  .rate-stars.k .star.on path{fill:var(--star-kasia);}
  .rate-stars.m .star.on path{fill:var(--star-michal);}

  /* expandable section: horizontal slider [desc] <-> [rate] */
  .exp{max-height:0;overflow:hidden;opacity:0;
       transition:max-height .44s cubic-bezier(.22,1,.36,1), opacity .3s ease;}
  .exp.open{opacity:1;}
  .slider{display:flex;align-items:flex-start;width:200%;
          transition:transform .42s cubic-bezier(.22,1,.36,1);}
  .exp.show-rate .slider{transform:translateX(-50%);}
  .slide{width:50%;flex:0 0 50%;}
  .exp-pad{padding:2px 22px 22px;}
  .author-tag{font-size:9px;color:var(--muted);margin-bottom:12px;}
  .author-tag .cmt-who{font-weight:700;}
  .desc-text{font-size:14px;line-height:1.55;color:rgba(38,43,58,.82);font-weight:400;white-space:pre-wrap;word-break:break-word;}
  .desc-text a{color:var(--star-michal);font-weight:600;}
  .desc-text b{font-weight:700;color:var(--ink);}
  .desc-actions{display:flex;justify-content:space-between;align-items:center;margin-top:22px;}
  .act-btns{display:flex;gap:8px;flex-wrap:wrap;}
  .btn-edit{
    border:none;cursor:pointer;color:var(--ink);font-family:inherit;font-size:14px;font-weight:600;
    padding:9px 18px;border-radius:10px;background:var(--btn);
  }
  .btn-edit:active{transform:scale(.97);}
  .box-ghost{min-width:70px;height:38px;border-radius:10px;background:var(--btn);border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:4px;padding:0 12px;color:var(--ink);line-height:1;
    transition:background .15s, transform .15s;}
  .box-ghost:active{transform:scale(.96);background:var(--btn-strong);}
  .box-ghost .lbl{font-size:10px;font-weight:500;color:var(--muted);}
  .box-ghost .num{font-size:15px;font-weight:700;}
  .rate-cta{
    cursor:pointer;font-family:inherit;font-weight:600;font-size:13px;letter-spacing:.3px;
    color:rgba(var(--glow-rgb),.95);
    padding:9px 18px;border-radius:11px;
    background:rgba(var(--glow-rgb),.12);
    border:none;
    animation:ctaBreathe 2.8s ease-in-out infinite;
  }
  .rate-cta:active{transform:scale(.96);}
  @keyframes ctaBreathe{
    0%,100%{ box-shadow:0 0 0 0 rgba(var(--glow-rgb),0); }
    50%{ box-shadow:0 0 0 4px rgba(var(--glow-rgb),.12); }
  }

  /* comments (inside description) */
  .cmt-label{font-size:12px;font-weight:500;color:var(--muted);margin:20px 0 10px;}
  .comments{display:flex;flex-direction:column;gap:9px;}
  .cmt{font-size:13px;line-height:1.4;display:flex;align-items:flex-start;}
  .cmt-who{font-weight:700;margin-right:6px;flex:0 0 auto;}
  .cmt-who.k{color:var(--star-kasia);}
  .cmt-who.m{color:var(--star-michal);}
  .cmt-txt{color:rgba(38,43,58,.8);flex:1;min-width:0;}
  .cmt-del{flex:0 0 auto;margin-left:8px;border:none;background:none;cursor:pointer;
    color:var(--faint);font-size:16px;line-height:1;padding:0 2px;}
  .cmt-del:active{color:var(--star-kasia);transform:scale(.9);}
  .comment-add{display:flex;gap:8px;margin-top:12px;}
  .comment-input{flex:1;min-width:0;font-family:inherit;font-size:13px;padding:10px 12px;border-radius:12px;
    border:1px solid var(--field-line);background:var(--field);color:var(--ink);outline:none;}
  .comment-input::placeholder{color:var(--faint);}
  .btn-cmt{border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);
    padding:0 16px;border-radius:12px;background:var(--btn);}
  .btn-cmt:active{transform:scale(.96);}

  /* login screen */
  .login-screen{position:absolute;inset:0;z-index:40;display:none;flex-direction:column;
    align-items:center;justify-content:center;padding:26px;
    background:
      radial-gradient(125% 85% at 12% -12%, rgba(var(--glow-rgb),.22), transparent 55%),
      radial-gradient(120% 90% at 105% 112%, rgba(var(--glow-rgb),.16), transparent 55%),
      linear-gradient(160deg,#fbfbfd 0%,#eceef3 100%);}
  .login-screen.active{display:flex;}
  .login-title{text-align:center;margin-bottom:28px;}
  .login-form{width:100%;max-width:340px;display:flex;flex-direction:column;}
  .login-sub{text-align:center;color:var(--muted);font-size:14px;margin:0 0 20px;}
  .login-err{color:#d23b6b;font-size:13px;min-height:18px;margin:2px 2px 10px;text-align:center;}
  .logout-opt{margin-top:14px;margin-left:12px;display:inline-block;border:none;cursor:pointer;
    color:var(--muted);font-family:inherit;font-size:14px;font-weight:600;padding:11px 20px;
    border-radius:11px;background:transparent;}
  .logout-opt:active{transform:scale(.97);}

  /* star expansion (rating) */
  .rate-title{display:none;font-size:15px;font-weight:500;color:var(--ink);margin:2px 0 12px;}
  body.dark .rate-title{display:block;}
  .rate-who-label{font-size:12px;font-weight:500;color:var(--muted);margin:0 0 8px;}
  .rate-who-label span{color:var(--ink);font-weight:700;}
  .rate-stars{display:flex;justify-content:space-between;margin:4px 0 18px;}
  .rate-stars .star{width:27px;height:27px;cursor:pointer;}
  .rate-actions{display:flex;justify-content:space-between;align-items:center;}
  .exp.readonly .rate-stars{pointer-events:none;opacity:.95;}
  .exp.readonly .btn-save-rate{display:none;}
  .exp.readonly .rate-actions{justify-content:flex-end;}
  .rate-block + .rate-block{margin-top:16px;padding-top:16px;border-top:1px solid rgba(38,43,58,.10);}
  .preview-block{opacity:.85;}
  .preview-block .rate-stars{pointer-events:none;}
  .rate-who-label em{font-style:normal;color:var(--faint);font-weight:500;}
  .btn-save-rate{
    border:none;cursor:pointer;color:var(--ink);font-family:inherit;font-size:16px;font-weight:600;
    padding:11px 28px;border-radius:11px;background:var(--btn);
  }
  .btn-save-rate:active{transform:scale(.97);}
  .rate-val{
    min-width:90px;height:44px;border-radius:11px;background:var(--btn);padding:0 14px;
    display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--ink);
  }
  .rate-val .lbl{font-size:11px;font-weight:500;color:var(--muted);margin-right:4px;}

  /* add card — dark / inactive look */
  .add-card{
    border-radius:30px;margin-bottom:13px;cursor:pointer;
    background:rgba(255,255,255,.30);
    border:1px dashed rgba(38,43,58,.20);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    transition:background .2s, transform .15s;
  }
  .add-card:active{transform:scale(.99);background:rgba(255,255,255,.5);}
  .add-row{display:flex;align-items:center;justify-content:center;gap:10px;min-height:76px;
    color:var(--faint);font-size:18px;font-weight:600;}
  .add-row .p{font-size:20px;font-weight:700;}
  .bottom-actions{display:flex;gap:12px;margin-bottom:13px;}
  .bottom-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:9px;min-height:76px;
    cursor:pointer;border-radius:16px;font-family:inherit;font-size:18px;font-weight:600;color:var(--faint);
    background:rgba(255,255,255,.30);border:1px dashed rgba(38,43,58,.20);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);transition:transform .12s, background .2s;}
  .bottom-btn:active{transform:scale(.98);background:rgba(255,255,255,.5);}
  .bottom-btn svg{width:19px;height:19px;stroke:var(--faint);fill:none;stroke-width:2;}
  .bottom-btn .p{font-size:20px;font-weight:700;color:var(--faint);}

  /* ================= ADD/EDIT FORM (overlay card) ================= */
  .form-screen{position:absolute;inset:0;z-index:30;display:none;flex-direction:column;
    background:rgba(30,34,50,0);transition:background .32s ease;}
  .form-screen.active{display:flex;}
  .form-screen.in{background:rgba(30,34,50,.34);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);}
  .form-card{margin:58px 18px 0;border-radius:30px;padding:74px 22px 22px;position:relative;
    will-change:transform,opacity;}
  .form-ico-btn{position:absolute;top:20px;right:20px;width:54px;height:54px;
    border-radius:16px;border:1.5px solid rgba(var(--glow-rgb),.4);background:var(--field);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    color:rgb(var(--glow-rgb));padding:0;}
  .form-ico-btn:active{transform:scale(.94);}
  .form-ico-btn svg{width:26px;height:26px;display:block;}
  .form-ico-edit{position:absolute;bottom:-6px;right:-6px;width:20px;height:20px;border-radius:50%;
    background:rgb(var(--glow-rgb));display:flex;align-items:center;justify-content:center;}
  .form-ico-edit svg{width:11px;height:11px;stroke:#fff;fill:none;stroke-width:2.4;
    stroke-linecap:round;stroke-linejoin:round;}
  /* ---- icon library picker ---- */
  .icopick{position:absolute;inset:0;z-index:60;display:none;flex-direction:column;
    background:rgba(30,34,50,.42);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}
  .icopick.active{display:flex;}
  .icopick-card{margin:auto 14px;width:calc(100% - 28px);max-width:440px;max-height:78vh;
    display:flex;flex-direction:column;border-radius:24px;padding:16px;
    background:var(--field);box-shadow:0 24px 60px rgba(20,24,40,.35);}
  .icopick-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .icopick-head .tt{font-size:16px;font-weight:600;color:var(--ink);flex:1;}
  .icopick-close{width:32px;height:32px;border:none;background:var(--btn);border-radius:10px;
    cursor:pointer;color:var(--muted);font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;}
  .ico-search{width:100%;font-family:inherit;font-size:15px;color:var(--ink);
    padding:12px 14px;border-radius:14px;border:1px solid var(--field-line);
    background:var(--glass);outline:none;margin-bottom:12px;}
  .ico-search::placeholder{color:var(--faint);}
  .ico-grid{overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(52px,1fr));
    gap:8px;padding:2px;-webkit-overflow-scrolling:touch;}
  .ico-item{aspect-ratio:1;border-radius:13px;border:1.5px solid var(--field-line);
    background:var(--glass);cursor:pointer;display:flex;align-items:center;justify-content:center;
    color:var(--ink);padding:0;}
  .ico-item:active{transform:scale(.9);}
  .ico-item svg{width:22px;height:22px;display:block;}
  .ico-item.sel{border-color:rgb(var(--glow-rgb));background:rgba(var(--glow-rgb),.14);color:rgb(var(--glow-rgb));}
  .ico-more{grid-column:1/-1;text-align:center;color:var(--faint);font-size:12px;padding:10px 0 4px;}
  .f-label{font-size:13px;font-weight:500;color:var(--muted);margin:4px 0 10px;}
  .f-input{
    width:100%;font-family:inherit;font-size:20px;font-weight:600;color:var(--ink);
    padding:16px 18px;border-radius:18px;border:1px solid var(--field-line);
    background:var(--field);outline:none;margin-bottom:20px;
  }
  .f-input::placeholder{color:var(--faint);font-weight:500;}
  .f-area{
    width:100%;font-family:inherit;font-size:15px;line-height:1.55;color:var(--ink);font-weight:400;
    padding:18px;border-radius:18px;border:1px solid var(--field-line);
    background:var(--field);outline:none;resize:none;min-height:150px;margin-bottom:24px;
  }
  .f-area::placeholder{color:var(--faint);}
  .form-actions{display:flex;gap:12px;align-items:center;}
  .btn-save-form{
    border:none;cursor:pointer;color:var(--ink);font-family:inherit;font-size:16px;font-weight:600;
    padding:11px 30px;border-radius:11px;background:var(--btn);border:none;
  }
  .btn-save-form:active{transform:scale(.97);}
  .btn-cancel{
    border:none;cursor:pointer;color:var(--muted);font-family:inherit;font-size:15px;font-weight:600;
    padding:13px 20px;background:none;
  }
  .btn-del-form{
    margin-left:auto;border:none;cursor:pointer;color:var(--muted);font-family:inherit;
    font-size:14px;font-weight:600;padding:13px 18px;border-radius:14px;background:var(--btn);
  }
  /* ===== dark theme (Archiwum) ===== */
  body.dark{
    --ink:#eaecf3;
    --muted:rgba(234,236,243,.6);
    --faint:rgba(234,236,243,.42);
    --glass:rgba(255,255,255,0.09);
    --glass-line:rgba(255,255,255,0.16);
    --btn:rgba(255,255,255,.09);
    --btn-strong:rgba(255,255,255,.16);
    --field:rgba(255,255,255,.10);
    --field-line:rgba(255,255,255,.16);
    --star-off:#454c5e;
    background:
      radial-gradient(125% 85% at 12% -12%, rgba(var(--glow-rgb),.26), transparent 55%),
      radial-gradient(120% 90% at 105% 112%, rgba(var(--glow-rgb),.16), transparent 55%),
      linear-gradient(160deg,#141821 0%,#0b0e14 100%);
  }
  body.dark .desc-text{color:rgba(234,236,243,.82);}
  body.dark .cmt-txt{color:rgba(234,236,243,.78);}
  body.dark .pp-addr{color:rgba(234,236,243,.7);}
  body.dark .rate-block + .rate-block{border-top-color:rgba(255,255,255,.12);}
  body.dark .cat-seg{background:rgba(255,255,255,.08);}
  body.dark .settings-btn line{stroke:rgba(255,255,255,.75);}
  body.dark .settings-btn circle{fill:#fff;}
  body.dark .glass{box-shadow:inset 0 1px 1px rgba(255,255,255,.14), 0 10px 28px rgba(0,0,0,.40);}
  body.dark .card.open{box-shadow:inset 0 1px 1px rgba(255,255,255,.14), 0 18px 40px rgba(0,0,0,.5);}

  /* ===== flat theme (solid cards, no glass/blur/bubbles) ===== */
  body.flat{ --surface:#ffffff; background:#eef0f3; }
  body.flat.dark{ --surface:#1b1f2b; background:#0f131a; }
  body.flat #bubbles{ display:none; }
  body.flat #aura{ display:none; }
  body.flat .glass{ background:var(--surface); backdrop-filter:none;-webkit-backdrop-filter:none;
    border:1px solid rgba(20,24,40,.05); box-shadow:0 3px 14px rgba(30,34,60,.07); }
  body.flat.dark .glass{ border-color:rgba(255,255,255,.06); box-shadow:0 3px 14px rgba(0,0,0,.45); }
  body.flat .card.open{ box-shadow:0 8px 22px rgba(30,34,60,.12); }
  body.flat.dark .card.open{ box-shadow:0 8px 22px rgba(0,0,0,.55); }
  body.flat .start-btn{ background:var(--surface); backdrop-filter:none;-webkit-backdrop-filter:none;
    border:1px solid rgba(20,24,40,.05); box-shadow:0 6px 18px rgba(30,34,60,.10); }
  body.flat .bottom-btn{ background:var(--surface); backdrop-filter:none;-webkit-backdrop-filter:none;
    border:1px solid rgba(20,24,40,.06); }
  body.flat .place-panel{ background:var(--surface); backdrop-filter:none;-webkit-backdrop-filter:none; }
  /* style toggle in options */
  .style-opts{display:flex;flex-direction:column;gap:10px;}
  .style-opt{flex:1;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;color:var(--muted);
    padding:10px 6px;border-radius:11px;background:rgba(20,24,40,.06);transition:all .15s;}
  .style-opt.sel{background:linear-gradient(120deg,var(--star-kasia),var(--star-michal));color:#fff;}
  .style-opt:active{transform:scale(.97);}
</style>
</head>

<div class="app">

  <!-- ===================== LOGIN SCREEN ===================== -->
  <section id="login" class="login-screen active">
    <div class="login-title">
      <svg class="brand-mark" viewBox="0 0 184 184" aria-label="Outsy"><use href="#sygnetSym"/></svg>
      <svg class="wordmark" viewBox="0 0 185 71" aria-label="Outsy adventure hub"><use href="#wordmarkSym"/></svg>
    </div>
    <div class="login-form">
      <div class="login-sub">Zaloguj się, aby zobaczyć wspólną listę przygód</div>
      <input id="logEmail" class="f-input" type="email" placeholder="E-mail" autocomplete="username">
      <input id="logPass" class="f-input" type="password" placeholder="Hasło" autocomplete="current-password">
      <div id="logErr" class="login-err"></div>
      <button class="start-btn" onclick="doLogin()">Zaloguj</button>
    </div>
  </section>

  <!-- ===================== START SCREEN ===================== -->
  <section id="start" class="screen active">
    <button class="settings-btn" onclick="toggleOptions()" aria-label="Opcje">
      <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round">
        <line x1="4" y1="7"  x2="20" y2="7"  stroke="rgba(38,43,58,.6)" stroke-width="2"/>
        <line x1="4" y1="14" x2="20" y2="14" stroke="rgba(38,43,58,.6)" stroke-width="2"/>
        <line x1="4" y1="21" x2="20" y2="21" stroke="rgba(38,43,58,.6)" stroke-width="2"/>
        <circle cx="9"  cy="7"  r="3" fill="#2a2f3d"/>
        <circle cx="15" cy="14" r="3" fill="#2a2f3d"/>
        <circle cx="8"  cy="21" r="3" fill="#2a2f3d"/>
      </svg>
    </button>

    <div class="hero-center">
      <svg class="brand-mark" viewBox="0 0 184 184" aria-label="Outsy"><use href="#sygnetSym"/></svg>
      <svg class="wordmark" viewBox="0 0 185 71" aria-label="Outsy adventure hub"><use href="#wordmarkSym"/></svg>
    </div>

    <div class="start-btn-wrap">
      <button class="start-btn" onclick="flyToList()"><span id="startLabel">Let's start Kasia!</span></button>
    </div>
  </section>

  <!-- ===================== LIST SCREEN ===================== -->
  <section id="list" class="screen">
    <div class="list-logo">
      <svg class="sygnet-sm" viewBox="0 0 184 184" aria-hidden="true"><use href="#sygnetSym"/></svg>
      <svg class="wordmark-sm" viewBox="0 0 185 71" aria-label="Outsy adventure hub"><use href="#wordmarkSym"/></svg>
    </div>
    <div class="cat-seg view-seg" id="viewSeg" data-active="0">
      <div class="cat-thumb glass"></div>
      <button class="cat-opt active" data-view="current" onclick="switchView('current')">Aktualne</button>
      <button class="cat-opt" data-view="archive" onclick="switchView('archive')">Archiwum</button>
    </div>
    <div class="cat-seg" id="catTabs" data-active="0">
      <div class="cat-thumb glass"></div>
      <button class="cat-opt active" data-cat="activity" onclick="switchCat('activity')">Aktywności</button>
      <button class="cat-opt" data-cat="food" onclick="switchCat('food')">Jedzenie</button>
      <button class="cat-opt" data-cat="vacation" onclick="switchCat('vacation')">Urlop</button>
    </div>
    <div class="scroll" id="listScroll">
      <div id="cards"></div>
      <div class="bottom-actions">
        <button class="bottom-btn" onclick="toggleDiscover()">
          <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
          Discover
        </button>
        <button class="bottom-btn" onclick="openForm()">
          <span class="p">+</span> Describe
        </button>
      </div>
    </div>
    <div id="discover" class="discover-view">
      <div class="search-row">
        <button class="disc-close" onclick="toggleDiscover()" aria-label="Zamknij mapę">
          <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg>
        </button>
        <input id="placeSearch" class="place-search" type="text" placeholder="Szukaj miejsca po nazwie…" autocomplete="off">
        <button class="search-go" onclick="runTextSearch()" aria-label="Szukaj na mapie">
          <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
        </button>
      </div>
      <div id="mapLimit" class="map-limit"></div>
      <div id="map"></div>
    </div>
    <div id="placePanel" class="place-panel">
      <div class="grab"></div>
      <div class="pp-photos" id="ppPhotos"></div>
      <div class="pp-name" id="ppName"></div>
      <div class="pp-meta" id="ppMeta"></div>
      <div class="pp-addr" id="ppAddr"></div>
      <div class="pp-actions">
        <button class="map-view-btn" onclick="viewOnMaps()">Zobacz szczegóły</button>
        <button class="map-add-btn" onclick="addFromMap()"><span class="p">+</span> Add an Adventure</button>
      </div>
    </div>
  </section>

  <!-- ===================== ADD / EDIT FORM ===================== -->
  <section id="form" class="form-screen" onclick="formBackdrop(event)">
    <div class="form-card glass">
      <button class="form-ico-btn" id="fIconBtn" type="button" onclick="openIconPicker()" title="Zmień ikonę">
        <i id="fIcon" data-lucide="sparkles"></i>
        <span class="form-ico-edit"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></span>
      </button>
      <div class="f-label">Nazwa aktywności</div>
      <input class="f-input" id="fName" type="text" placeholder="Nazwa" autocomplete="off" oninput="if(!formIcon)renderFormIcon()">
      <div class="f-label">Opis lub link</div>
      <textarea class="f-area" id="fDesc" placeholder="Opis..." oninput="if(!formIcon)renderFormIcon()"></textarea>
      <div class="form-actions">
        <button class="btn-save-form" onclick="saveForm()">Save</button>
        <button class="btn-cancel" onclick="closeForm()">Anuluj</button>
        <button class="btn-del-form" id="fDel" style="display:none" onclick="deleteFromForm()">Usuń</button>
      </div>
    </div>
  </section>

  <!-- ===================== ICON LIBRARY PICKER ===================== -->
  <div id="iconPicker" class="icopick" onclick="if(event.target.id==='iconPicker')closeIconPicker()">
    <div class="icopick-card">
      <div class="icopick-head">
        <div class="tt">Wybierz ikonę</div>
        <button class="icopick-close" type="button" onclick="closeIconPicker()">×</button>
      </div>
      <input class="ico-search" id="icoSearch" type="text" placeholder="Szukaj (po angielsku, np. heart, food, car)…" autocomplete="off" oninput="renderIconGrid(this.value)">
      <div class="ico-grid" id="icoGrid"></div>
    </div>
  </div>

  <!-- options panel (global — overlays any screen) -->
  <div class="options glass" id="options">
    <div class="opt-grid">
      <div>
        <div class="opt-label">Wybierz kolor aplikacji</div>
        <div class="swatches">
          <div class="swatch sel" data-theme="pink" style="background:#FF4EAC" onclick="pickTheme(this,'pink')"></div>
          <div class="swatch" data-theme="blue" style="background:#1E64CB" onclick="pickTheme(this,'blue')"></div>
        </div>
      </div>
    </div>
    <button class="save-opt" onclick="saveOptions()">Save</button>
    <button class="logout-opt" onclick="doLogout()">Wyloguj</button>
  </div>

</div>

<script>
/* ===================== STATE ===================== */
var STAR_SVG = '<path d="M12 2l2.95 5.98 6.6.96-4.77 4.65 1.13 6.57L12 17.02 6.09 20.16l1.13-6.57L2.45 8.94l6.6-.96z"/>';
var THEMES = {           // value = RGB of the accent / background glow
  pink: {glow:'255,78,172'},
  blue: {glow:'30,100,203'}
};
var state = {
  theme:'pink',
  user:'kasia',           // active perspective
  pendingTheme:'pink',
  pendingUser:'kasia'
};
var activities = [];   // populated from Firestore after login

function ra(){ return Math.random()<0.5 ? 'kasia' : 'michal'; }   // random author
function seed(){
  return [
    {id:id(), name:'Bilard',            desc:'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nullam quis turpis id elit auctor laoreet. Quisque vitae tempor urna, in tincidunt mi. Sed eget ultrices quam. Vivamus facilisis odio at tellus consequat, at egestas ligula suscipit. <b>www.bilard.waw.pl</b>', k:null, m:6, author:ra(), comments:[{who:'kasia',text:'Uwielbiam bilard!'},{who:'michal',text:'Rewanż za tydzień 😉'}]},
    {id:id(), name:'Wycieczka rowerowa', desc:'Trasa wzdłuż rzeki, około 30 km. <b>www.szlaki.pl</b>', k:null, m:null, author:ra(), comments:[]},
    {id:id(), name:'Nurkowanie',         desc:'Kurs nurkowania na basenie, potem otwarta woda.', k:null, m:8, author:ra(), comments:[]},
    {id:id(), name:'Rancho z kozami',    desc:'Weekend na ranczu, jazda konna i kozy.', k:null, m:null, author:ra(), comments:[]},
    {id:id(), name:'SPA z Sauną',        desc:'Dzień relaksu, sauna fińska i masaż.', k:null, m:9, author:ra(), comments:[]},
    {id:id(), name:'SPA z Sauną',        desc:'Druga lokalizacja, blisko domu.', k:null, m:null, author:ra(), comments:[]}
  ];
}
function id(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function load(){ try{ return JSON.parse(localStorage.getItem('advhub.v2')); }catch(e){ return null; } }
function save(){ if(docRef){ docRef.set({activities: activities}).catch(function(){}); } }
function saveSettings(){ localStorage.setItem('advhub.set', JSON.stringify({theme:state.theme,user:state.user})); }
function loadSettings(){ try{ return JSON.parse(localStorage.getItem('advhub.set')); }catch(e){ return null; } }

/* ===================== THEME ===================== */
function applyTheme(name){
  var t = THEMES[name]; if(!t) return;
  document.documentElement.style.setProperty('--glow-rgb', t.glow);
  var meta=document.querySelector('meta[name=theme-color]'); if(meta) meta.setAttribute('content','#f7f7fa');
}

/* ===================== NAV ===================== */
function go(scr){
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(scr).classList.add('active');
  if(scr==='list') render();
  if(scr==='start') startBubbles();
}

/* ===================== OPTIONS ===================== */
function toggleOptions(){ document.getElementById('options').classList.toggle('open'); }
function pickTheme(el,name){
  document.querySelectorAll('.swatch').forEach(function(s){ s.classList.remove('sel'); });
  el.classList.add('sel'); state.pendingTheme=name; applyTheme(name); /* live preview */
}
function pickUser(el,name){
  document.querySelectorAll('.user').forEach(function(u){ u.classList.remove('sel'); });
  el.classList.add('sel'); state.pendingUser=name;
}
function saveOptions(){
  state.theme=state.pendingTheme;               // user identity comes from login, not editable here
  applyTheme(state.theme); saveSettings();
  document.getElementById('options').classList.remove('open');
}
function updateUserBadge(){
  var b=document.getElementById('userBadge'); if(!b) return;
  var kasia = state.user==='kasia';
  var sym = kasia
    ? '<circle cx="12" cy="8" r="5"/><line x1="12" y1="13" x2="12" y2="22"/><line x1="8.5" y1="18.5" x2="15.5" y2="18.5"/>'
    : '<circle cx="10" cy="14" r="5"/><line x1="13.5" y1="10.5" x2="20" y2="4"/><polyline points="15,4 20,4 20,9"/>';
  b.innerHTML = '<span class="nm">'+(kasia?'Kasia':'Michał')+'</span>'+
    '<span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">'+sym+'</svg></span>';
}

/* ===================== LIST RENDER ===================== */
function avg(a){
  var vals=[]; if(a.k!=null) vals.push(a.k); if(a.m!=null) vals.push(a.m);
  if(!vals.length) return -1;
  return vals.reduce(function(s,v){return s+v;},0)/vals.length;
}
function starSVG(on, cls){
  return '<svg class="star'+(on?' on':'')+(cls?' '+cls:'')+'" viewBox="0 0 24 24">'+STAR_SVG+'</svg>';
}
var currentCat='activity';
var viewMode='current';   // 'current' (Aktualności) | 'archive' (Archiwum)
function switchView(v){
  if(v===viewMode) return;
  viewMode=v;
  document.body.classList.toggle('dark', v==='archive');   // ciemny motyw w Archiwum
  var mt=document.querySelector('meta[name=theme-color]'); if(mt) mt.setAttribute('content', v==='archive'?'#0f1218':'#f7f7fa');
  document.getElementById('viewSeg').setAttribute('data-active', v==='archive'?1:0);
  var t=document.querySelectorAll('#viewSeg .cat-opt');
  for(var i=0;i<t.length;i++) t[i].classList.toggle('active', t[i].dataset.view===v);
  render();
  var c=document.getElementById('listScroll'); if(!c) return;
  var dir=(v==='archive')?1:-1;
  c.style.transition='none'; c.style.transform='translateX('+(dir*40)+'px)'; c.style.opacity='0';
  requestAnimationFrame(function(){ requestAnimationFrame(function(){
    c.style.transition='transform .35s cubic-bezier(.22,1,.36,1), opacity .3s ease';
    c.style.transform='translateX(0)'; c.style.opacity='1';
  });});
  setTimeout(function(){ c.style.transition=''; c.style.transform=''; c.style.opacity=''; }, 380);
}
function toggleArchive(idv){
  var a=find(idv); if(!a) return;
  var msg = a.archived ? 'Przywrócić do Aktualnych? Oceny i komentarze zostaną wyzerowane — dodajecie je od nowa.'
                       : 'Przenieść do Archiwum? Oceny i komentarze zostaną wyzerowane — w Archiwum dodajecie je od nowa.';
  if(!confirm(msg)) return;
  a.k=null; a.m=null; a.comments=[];        // przy przenoszeniu (w obie strony) oceny i komentarze od nowa
  a.archived=!a.archived;
  save(); flipRender();
}
function switchCat(cat){
  if(cat===currentCat) return;
  var order={activity:0,food:1,vacation:2};
  var dir = (order[cat]>order[currentCat]) ? 1 : -1;   // new tab to the right -> slide in from the right
  currentCat=cat;
  document.getElementById('catTabs').setAttribute('data-active', order[cat]);   // slide the glass thumb
  var tabs=document.querySelectorAll('.cat-opt');
  for(var i=0;i<tabs.length;i++) tabs[i].classList.toggle('active', tabs[i].dataset.cat===cat);
  render();
  var c=document.getElementById('listScroll'); if(!c) return;
  c.style.transition='none'; c.style.transform='translateX('+(dir*40)+'px)'; c.style.opacity='0';
  requestAnimationFrame(function(){ requestAnimationFrame(function(){
    c.style.transition='transform .35s cubic-bezier(.22,1,.36,1), opacity .3s ease';
    c.style.transform='translateX(0)'; c.style.opacity='1';
  });});
  setTimeout(function(){ c.style.transition=''; c.style.transform=''; c.style.opacity=''; }, 380);
}
function render(){
  var arch=(viewMode==='archive');
  var sorted = activities.filter(function(a){ return (a.category||'activity')===currentCat && (!!a.archived===arch); })
                         .sort(function(a,b){ return avg(b)-avg(a); });
  var ba=document.querySelector('.bottom-actions'); if(ba) ba.style.display = arch?'none':'';
  var html='<div id="aura"></div>';
  sorted.forEach(function(a){ html += card(a); });
  document.getElementById('cards').innerHTML = html;
  if(window.lucide) lucide.createIcons();
  buildAura(sorted.length);
  syncAura();
}

/* ---- blob layer (goo) sync ---- */
function buildAura(n){
  var aura=document.getElementById('aura'); if(!aura) return;
  var s=''; for(var i=0;i<n;i++) s+='<div class="aura-blob"></div>';
  aura.innerHTML=s;
}
function syncAura(){
  var wrap=document.getElementById('cards'); if(!wrap) return;
  var aura=document.getElementById('aura'); if(!aura) return;
  var cards=wrap.querySelectorAll('.card');
  var blobs=aura.children;
  for(var i=0;i<cards.length && i<blobs.length;i++){
    var c=cards[i], b=blobs[i];
    b.style.left=c.offsetLeft+'px';
    b.style.top=c.offsetTop+'px';
    b.style.width=c.offsetWidth+'px';
    b.style.height=c.offsetHeight+'px';
  }
}
var auraEnd=0, auraRAF=null;
function animateAura(){
  auraEnd=performance.now()+560;
  if(auraRAF) return;
  function loop(t){ syncAura(); if(t<auraEnd){ auraRAF=requestAnimationFrame(loop);} else { auraRAF=null; syncAura(); } }
  auraRAF=requestAnimationFrame(loop);
}

/* FLIP: re-render, then smoothly slide each card from its old spot to the new one */
function flipRender(){
  var wrap=document.getElementById('cards'); if(!wrap){ render(); return; }
  var olds={}, prev=wrap.querySelectorAll('.card');
  for(var i=0;i<prev.length;i++){ olds[prev[i].id]=prev[i].getBoundingClientRect().top; }
  render();                                   // rebuild in new (sorted) order
  var cards=wrap.querySelectorAll('.card');
  var aura=document.getElementById('aura'); var blobs=aura?aura.children:[];
  for(var j=0;j<cards.length;j++){
    var c=cards[j], oldTop=olds[c.id];
    if(oldTop==null) continue;                // brand-new card: no slide
    var dy=oldTop-c.getBoundingClientRect().top;
    if(Math.abs(dy)<0.5) continue;
    var bl=blobs[j];
    c.style.transition='none'; c.style.transform='translateY('+dy+'px)';
    if(bl){ bl.style.transition='none'; bl.style.transform='translateY('+dy+'px)'; }
    (function(card, blob){
      requestAnimationFrame(function(){ requestAnimationFrame(function(){
        card.style.transition='transform .52s cubic-bezier(.22,1,.36,1)';
        card.style.transform='translateY(0)';
        if(blob){ blob.style.transition='transform .52s cubic-bezier(.22,1,.36,1)'; blob.style.transform='translateY(0)'; }
        setTimeout(function(){
          card.style.transition=''; card.style.transform='';
          if(blob){ blob.style.transition=''; blob.style.transform=''; }
        }, 560);
      });});
    })(c, bl);
  }
}

/* ===================== INTERACTIONS ===================== */
var tempRate = {};   // id -> value being edited
var editWho = {};    // id -> 'kasia' | 'michal' (which person's star is open)

function slideOf(exp, view){ return exp.querySelectorAll('.slide')[view==='rate'?1:0]; }
function refreshHeight(idv){
  var exp=document.getElementById('exp-'+idv); if(!exp||!exp.classList.contains('open')) return;
  var view=exp.classList.contains('show-rate')?'rate':'desc';
  exp.style.maxHeight=slideOf(exp,view).scrollHeight+'px';
}
function collapseCard(idv){
  var exp=document.getElementById('exp-'+idv);
  exp.classList.remove('open'); exp.style.maxHeight='0px';
  var c=document.getElementById('card-'+idv); c.classList.remove('open'); c.classList.remove('minus');
}
function closeOthers(exceptId){
  var exps=document.querySelectorAll('.exp.open');
  for(var i=0;i<exps.length;i++){
    if(exps[i].id!=='exp-'+exceptId){ exps[i].classList.remove('open'); exps[i].style.maxHeight='0px'; }
  }
  var cards=document.querySelectorAll('.card.open');
  for(var j=0;j<cards.length;j++){ if(cards[j].id!=='card-'+exceptId){ cards[j].classList.remove('open'); cards[j].classList.remove('minus'); } }
}
/* open the card on a given view; switching desc<->rate slides horizontally */
function openCard(idv, view){
  closeOthers(idv);
  var exp=document.getElementById('exp-'+idv), card=document.getElementById('card-'+idv);
  var wasOpen=exp.classList.contains('open');
  var curView=exp.classList.contains('show-rate')?'rate':'desc';
  if(wasOpen && curView===view){ collapseCard(idv); animateAura(); return; }  // tap same view = close
  if(view==='rate') prepareRate(idv);
  exp.classList.toggle('show-rate', view==='rate');   // horizontal slide
  exp.classList.add('open'); card.classList.add('open');
  card.classList.toggle('minus', view==='desc');      // plus -> minus on the description view
  exp.style.maxHeight=slideOf(exp,view).scrollHeight+'px';
  animateAura();
}
function toggleDesc(idv){ openCard(idv,'desc'); }
function openRateActive(idv){ openCard(idv,'rate'); }
function toggleRate(idv, who){ openCard(idv,'rate'); }   // you always rate as the selected user
function prepareRate(idv){
  var a=find(idv);
  var me=state.user, other=me==='kasia'?'michal':'kasia';
  editWho[idv]=me;
  var myVal=me==='kasia'?a.k:a.m, otherVal=other==='kasia'?a.k:a.m;
  tempRate[idv]=myVal||0;
  document.getElementById('ratewho-'+idv).textContent=(me==='kasia'?'Kasia':'Michał');
  document.getElementById('prevwho-'+idv).textContent=(other==='kasia'?'Kasia':'Michał');
  var es=document.getElementById('ratestars-'+idv); es.classList.remove('k','m'); es.classList.add(me==='kasia'?'k':'m');
  var ps=document.getElementById('prevstars-'+idv); ps.classList.remove('k','m'); ps.classList.add(other==='kasia'?'k':'m');
  paintRate(idv, tempRate[idv]);
  paintPreview(idv, otherVal||0);
}
function setTemp(idv, v){ tempRate[idv]=v; paintRate(idv,v); }
function paintRate(idv, v){
  var cont=document.getElementById('ratestars-'+idv);
  if(cont){ [].forEach.call(cont.querySelectorAll('.star'), function(s,i){
    if(i < v) s.classList.add('on'); else s.classList.remove('on');
  }); }
  // value box shows the AVERAGE of both ratings (live, using my current pick + the other's saved score)
  var a=find(idv); if(!a) return;
  var otherV = (state.user==='kasia') ? a.m : a.k;
  var vals=[]; if(v>0) vals.push(v); if(otherV!=null) vals.push(otherV);
  var val=document.getElementById('rateval-'+idv);
  if(val){
    var disp = vals.length ? (vals.reduce(function(s,x){return s+x;},0)/vals.length).toFixed(1) : '–';
    val.innerHTML='<span class="lbl">śr.</span> '+disp;
  }
}
function saveRate(idv){
  var a=find(idv); var v=tempRate[idv]||0;
  var who=state.user;                 // always save as the currently selected user
  if(v>0){ if(who==='kasia') a.k=v; else a.m=v; }
  save();
  collapseCard(idv);
  animateAura();
  setTimeout(flipRender, 470); /* re-sort with a smooth slide after the collapse animation */
}

/* ===================== FORM ===================== */
var editId=null;
function showFormFrom(srcEl){
  var form=document.getElementById('form');
  var fc=form.querySelector('.form-card');
  form.classList.add('active');                 // display:flex so we can measure
  fc.style.transition='none';
  fc.style.transform='none';
  fc.style.opacity='1';
  var t=fc.getBoundingClientRect();
  var s=srcEl?srcEl.getBoundingClientRect():t;
  var sx=Math.max(s.width/t.width, .15), sy=Math.max(s.height/t.height, .15);
  var dx=(s.left+s.width/2)-(t.left+t.width/2);
  var dy=(s.top+s.height/2)-(t.top+t.height/2);
  fc.style.transformOrigin='center center';
  fc.style.transform='translate('+dx+'px,'+dy+'px) scale('+sx+','+sy+')';
  fc.style.opacity='0';
  requestAnimationFrame(function(){ requestAnimationFrame(function(){
    fc.style.transition='transform .36s cubic-bezier(.22,1,.36,1), opacity .28s ease';
    fc.style.transform='none';
    fc.style.opacity='1';
    form.classList.add('in');                   // dark backdrop fades in
  });});
}
function hideForm(){
  var form=document.getElementById('form');
  var fc=form.querySelector('.form-card');
  form.classList.remove('in');
  fc.style.transition='transform .26s ease, opacity .24s ease';
  fc.style.transform='scale(.86)';
  fc.style.opacity='0';
  setTimeout(function(){
    form.classList.remove('active');
    fc.style.transition=''; fc.style.transform=''; fc.style.opacity='';
  }, 260);
}

/* ---- icon library picker ---- */
var ALL_ICONS=null;
function allIconNames(){
  if(ALL_ICONS) return ALL_ICONS;
  var out=[], seen={};
  if(window.lucide){
    Object.keys(lucide).forEach(function(k){
      if(!/^[A-Z][A-Za-z0-9]*$/.test(k)) return;          // icon exports are PascalCase
      if(k==='Icon') return;
      var base=k.replace(/Icon$/,'');                       // drop alias suffix
      var kebab=base.replace(/([a-z])([0-9])/g,'$1-$2')
                    .replace(/([a-z0-9])([A-Z])/g,'$1-$2')
                    .toLowerCase();
      if(seen[kebab]) return; seen[kebab]=1; out.push(kebab);
    });
  }
  out.sort();
  ALL_ICONS=out; return out;
}
function renderIconGrid(q){
  var grid=document.getElementById('icoGrid'); if(!grid) return;
  q=(q||'').toLowerCase().trim();
  var names=allIconNames();
  var list=q ? names.filter(function(n){return n.indexOf(q)>=0;}) : names;
  var cap=300, shown=list.slice(0,cap);
  var cur=formIcon || pickIcon({name:document.getElementById('fName').value,desc:document.getElementById('fDesc').value});
  grid.innerHTML=shown.map(function(n){
    return '<button type="button" class="ico-item'+(n===cur?' sel':'')+'" title="'+n+'" onclick="chooseIcon(\''+n+'\')"><i data-lucide="'+n+'"></i></button>';
  }).join('') + (list.length>cap ? '<div class="ico-more">Pokazano '+cap+' z '+list.length+' — zawęź wyszukiwaniem</div>' : '');
  if(window.lucide) lucide.createIcons();
  /* drop any icon name that didn't resolve to an SVG (keeps the grid clean) */
  var items=grid.querySelectorAll('.ico-item');
  for(var i=0;i<items.length;i++){ if(!items[i].querySelector('svg')) items[i].style.display='none'; }
}
function openIconPicker(){
  document.getElementById('icoSearch').value='';
  renderIconGrid('');
  document.getElementById('iconPicker').classList.add('active');
}
function closeIconPicker(){ document.getElementById('iconPicker').classList.remove('active'); }
function chooseIcon(name){

function closeForm(){ hideForm(); }
function saveForm(){
  var name=document.getElementById('fName').value.trim();
  var desc=document.getElementById('fDesc').value.trim();
  if(!name){ document.getElementById('fName').focus(); return; }
  if(editId){
    var a=find(editId); a.name=name; a.desc=desc||a.desc;
    if(formIcon) a.icon=formIcon; else delete a.icon;   // null = back to auto
  }else{
    var na={id:id(), name:name, desc:desc||'Brak opisu.', k:null, m:null, author:state.user, category:currentCat, comments:[]};
    if(formIcon) na.icon=formIcon;
    activities.push(na);
  }
  save(); closeForm(); flipRender();
  if(discoverOn) toggleDiscover();   // came from the map -> show the list with the new activity
}
function deleteFromForm(){
  if(!editId) return;

  if(confirm('Usunąć tę aktywność?')){
    activities=activities.filter(function(x){return x.id!==editId;});

/* ===================== HELPERS ===================== */
function find(idv){ for(var i=0;i<activities.length;i++) if(activities[i].id===idv) return activities[i]; }
function esc(s){ return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }

/* ===================== BUBBLE PHYSICS ===================== */
var bubbleState=null;
/* gyroscope tilt -> gravity for the bubbles */
var gX=0, gY=0, gBase=null, gActive=false;
function onOrient(e){
  if(e.gamma==null || e.beta==null) return;
  if(!gBase){ gBase={g:e.gamma, b:e.beta}; }   // how you're holding it now = neutral
  gActive=true;
  gX = Math.max(-0.30, Math.min(0.30, (e.gamma - gBase.g) * 0.010));  // tilt left/right
  gY = Math.max(-0.30, Math.min(0.30, (e.beta  - gBase.b) * 0.010));  // tilt forward/back
}
function setupGyro(){
  if(!window.DeviceOrientationEvent) return;
  if(typeof DeviceOrientationEvent.requestPermission==='function'){
    // iOS 13+: needs a tap to grant permission
    var ask=function(){
      DeviceOrientationEvent.requestPermission().then(function(r){
        if(r==='granted') window.addEventListener('deviceorientation', onOrient);
      }).catch(function(){});
      document.removeEventListener('touchend', ask); document.removeEventListener('click', ask);
    };
    document.addEventListener('touchend', ask); document.addEventListener('click', ask);
  } else {
    window.addEventListener('deviceorientation', onOrient);   // Android
  }
}
var bubblesRunning=false;
function startBubbles(){
  var host=document.getElementById('bubbles');
  if(!host) return;                              // bubbles removed
  if(bubbleState){ resumeBubbles(); return; }   // already built -> just ensure it's running
  var W=host.clientWidth||390, H=host.clientHeight||844;
  var defs=[58,72,46,90,64,80,52];
  var balls=[];
  defs.forEach(function(r){
    var el=document.createElement('div'); el.className='bubble';
    el.style.width=r+'px'; el.style.height=r+'px';
    host.appendChild(el);
    balls.push({
      el:el, r:r/2,
      x:Math.random()*(W-r)+r/2,
      y:Math.random()*(H-r)+r/2,
      vx:(Math.random()*2-1)*0.5,
      vy:(Math.random()*2-1)*0.5
    });
  });
  bubbleState={balls:balls, W:W, H:H, host:host};
  bubblesRunning=true;
  requestAnimationFrame(stepBubbles);
}
var bubbleHideTimer=null;
function resumeBubbles(){ if(bubbleState && !bubblesRunning){ bubblesRunning=true; requestAnimationFrame(stepBubbles); } }
function pauseBubbles(){ bubblesRunning=false; }
function showBubbles(){ clearTimeout(bubbleHideTimer); var h=document.getElementById('bubbles'); if(h) h.style.opacity='1'; resumeBubbles(); }
function hideBubbles(){ var h=document.getElementById('bubbles'); if(h) h.style.opacity='0'; clearTimeout(bubbleHideTimer); bubbleHideTimer=setTimeout(pauseBubbles, 850); }  // fade out, then stop the loop (perf)
function stepBubbles(){
  var st=bubbleState; if(!st || !bubblesRunning) return;
  var b=st.balls, W=st.host.clientWidth||st.W, H=st.host.clientHeight||st.H;
  // move + wall bounce (+ gyroscope gravity when available)
  for(var i=0;i<b.length;i++){
    var p=b[i];
    if(gActive){
      p.vx+=gX; p.vy+=gY;
      p.vx*=0.985; p.vy*=0.985;               // friction so they settle like marbles
      var sp=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
      if(sp>6){ p.vx=p.vx/sp*6; p.vy=p.vy/sp*6; }
    }
    p.x+=p.vx; p.y+=p.vy;
    if(p.x-p.r<0){ p.x=p.r; p.vx=Math.abs(p.vx); }
    if(p.x+p.r>W){ p.x=W-p.r; p.vx=-Math.abs(p.vx); }
    if(p.y-p.r<0){ p.y=p.r; p.vy=Math.abs(p.vy); }
    if(p.y+p.r>H){ p.y=H-p.r; p.vy=-Math.abs(p.vy); }
  }
  // pairwise elastic collisions (equal-ish mass ~ r^2)
  for(var i=0;i<b.length;i++){
    for(var j=i+1;j<b.length;j++){
      var a=b[i], c=b[j];
      var dx=c.x-a.x, dy=c.y-a.y;
      var dist=Math.sqrt(dx*dx+dy*dy)||0.0001;
      var min=a.r+c.r;
      if(dist<min){
        var nx=dx/dist, ny=dy/dist;
        // separate
        var overlap=(min-dist)/2;
        a.x-=nx*overlap; a.y-=ny*overlap;
        c.x+=nx*overlap; c.y+=ny*overlap;
        // relative velocity along normal
        var dvx=c.vx-a.vx, dvy=c.vy-a.vy;
        var rel=dvx*nx+dvy*ny;
        if(rel<0){
          var ma=a.r*a.r, mc=c.r*c.r;
          var imp=2*rel/(ma+mc);
          a.vx+=imp*mc*nx; a.vy+=imp*mc*ny;
          c.vx-=imp*ma*nx; c.vy-=imp*ma*ny;
        }
      }
    }
  }
  for(var i=0;i<b.length;i++){
    var p=b[i];
    p.el.style.transform='translate('+(p.x-p.r)+'px,'+(p.y-p.r)+'px)';
  }
  if(bubblesRunning) requestAnimationFrame(stepBubbles);
}

/* elastic transition list -> start (slingshot feel) */
var scrTrans=null, transitioning=false;
function flyToStart(){
  clearTimeout(scrTrans); transitioning=true;   // cancel previous cleanup (prevents "everything disappears")
  var list=document.getElementById('list');
  var start=document.getElementById('start');
  showBubbles();                         // bubbles fade back in
  start.classList.add('active'); list.classList.add('active');   // both visible during the slide
  start.style.transition='none'; start.style.transform='translateY(-100%)'; start.style.opacity='';
  list.style.transition='none';
  if(!list.style.transform){ list.style.transform='none'; }
  void start.offsetWidth;
  requestAnimationFrame(function(){ requestAnimationFrame(function(){
    var e='transform .6s cubic-bezier(.34,1.4,.6,1)';
    start.style.transition=e; start.style.transform='none';            // start slides down into view (as one)
    list.style.transition=e;  list.style.transform='translateY(100%)'; // list slides down out
  });});
  scrTrans=setTimeout(function(){
    list.classList.remove('active');
    list.style.transition=''; list.style.transform='';
    start.style.transition=''; start.style.transform=''; start.style.opacity='';
    transitioning=false;
  }, 680);
}

/* elastic transition start -> list (catapult) */
function flyToList(){
  clearTimeout(scrTrans); transitioning=true;   // cancel previous cleanup
  var list=document.getElementById('list');
  var start=document.getElementById('start');
  render();
  hideBubbles();                         // bubbles fade out on the activities screen
  list.classList.add('active'); start.classList.add('active');
  list.style.transition='none'; list.style.transform='translateY(100%)';   // list waits below the screen
  start.style.transition='none';
  if(!start.style.transform){ start.style.transform='none'; }
  void list.offsetWidth;
  requestAnimationFrame(function(){ requestAnimationFrame(function(){
    var e='transform .6s cubic-bezier(.34,1.4,.6,1)';
    start.style.transition=e; start.style.transform='translateY(-100%)'; // whole start (title, sub, button, gear) slides up
    list.style.transition=e;  list.style.transform='none';              // list slides up into place
  });});
  scrTrans=setTimeout(function(){
    start.classList.remove('active');
    start.style.transition=''; start.style.transform=''; start.style.opacity='';
    list.style.transition=''; list.style.transform='';
    transitioning=false;
  }, 680);
}

/* pull the start screen up -> catapult to the list */
function setupPullForward(){
  var start=document.getElementById('start'); if(!start) return;
  var startY=0, pulling=false, dist=0;
  start.addEventListener('touchstart', function(e){
    if(transitioning){ pulling=false; return; }
    if(e.target.closest && (e.target.closest('.settings-btn')||e.target.closest('.start-btn')||e.target.closest('.options'))){ pulling=false; return; }
    startY=e.touches[0].clientY; pulling=true; dist=0; start.style.transition='none';
  }, {passive:true});
  start.addEventListener('touchmove', function(e){
    if(!pulling) return;
    var dy=e.touches[0].clientY-startY;
    if(dy<0){ e.preventDefault(); dist=-dy; start.style.transform='translateY('+Math.max(dy*0.5,-190)+'px)'; }
    else { start.style.transform=''; }
  }, {passive:false});
  function end(){
    if(!pulling) return; pulling=false;
    if(dist>150){ flyToList(); dist=0; return; }          // catapult to the list
    start.style.transition='transform .32s cubic-bezier(.34,1.56,.64,1)'; start.style.transform='';
    dist=0;
  }
  start.addEventListener('touchend', end, {passive:true});
  start.addEventListener('touchcancel', end, {passive:true});
}

/* strong pull-down at the top of the list -> go back to the start screen */
function setupPullBack(){
  var list=document.getElementById('list'); if(!list) return;
  var scroll=list.querySelector('.scroll');
  var startY=0, pulling=false, dist=0;
  list.addEventListener('touchstart', function(e){
    if(discoverOn || transitioning || !scroll || scroll.scrollTop>0){ pulling=false; return; }
    startY=e.touches[0].clientY; pulling=true; dist=0; list.style.transition='none';
  }, {passive:true});
  list.addEventListener('touchmove', function(e){
    if(!pulling) return;
    if(scroll.scrollTop>0){ pulling=false; list.style.transform=''; return; }
    var dy=e.touches[0].clientY-startY;
    if(dy>0){
      e.preventDefault();                 // take over the pull (native refresh is disabled via CSS)
      dist=dy;
      list.style.transform='translateY('+Math.min(dy*0.5,190)+'px)';
    } else { list.style.transform=''; }
  }, {passive:false});
  function endPull(){
    if(!pulling) return; pulling=false;
    if(dist>150){ flyToStart(); dist=0; return; }        // shot back to start, elastically
    list.style.transition='transform .32s cubic-bezier(.34,1.56,.64,1)'; list.style.transform='';  // springy snap-back
    dist=0;
  }
  list.addEventListener('touchend', endPull, {passive:true});
  list.addEventListener('touchcancel', endPull, {passive:true});
}

    if(status!==google.maps.places.PlacesServiceStatus.OK || !results || !results.length) return;
    var bounds=new google.maps.LatLngBounds();
    results.slice(0,20).forEach(function(r){
      if(!r.geometry) return;
      var m=new google.maps.Marker({ position:r.geometry.location, map:gmap, title:r.name,
        icon:dotIcon(11),
        label:{ text:r.name, color:'#20242e', fontSize:'12px', fontWeight:'700', className:'map-label' } });
      m.addListener('click', (function(res){ return function(){ gmap.panTo(res.geometry.location); if(res.place_id) showPlaceById(res.place_id); else selectPlace(res); }; })(r));
      searchMarkers.push(m); bounds.extend(r.geometry.location);
    });
    gmap.fitBounds(bounds);
  });
}
function addFromMap(){
  if(!selectedPlace) return;
  editId=null; formIcon=null;
  document.getElementById('fName').value=selectedPlace.name;
  var link='<a href="'+selectedPlace.url+'" target="_blank" rel="noopener">📍 Otwórz w Google Maps</a>';
  document.getElementById('fDesc').value=(selectedPlace.descText? selectedPlace.descText+'\n\n':'')+link;
  document.getElementById('fDel').style.display='none';
  renderFormIcon();
  showFormFrom(document.querySelector('.discover-btn'));
}

/* ===================== INIT ===================== */
(function init(){
  var s=loadSettings();
  if(s){ state.theme=s.theme||'pink'; state.user=s.user||'kasia';
         state.pendingTheme=state.theme; state.pendingUser=state.user; }
  if(!THEMES[state.theme]){ state.theme='pink'; state.pendingTheme='pink'; }   // guard against old saved themes
  applyTheme(state.theme);
  document.body.classList.remove('flat');
  // reflect selections in options UI
  document.querySelectorAll('.swatch').forEach(function(el){ el.classList.toggle('sel', el.dataset.theme===state.theme); });
  document.querySelectorAll('.user').forEach(function(el){ el.classList.toggle('sel', el.dataset.user===state.user); });
  document.getElementById('startLabel').textContent = "Let's start "+(state.user==='kasia'?'Kasia':'Michał')+"!";
  updateUserBadge();
  startBubbles();
  setupGyro();
  setupSwipe();
  setupPullBack();
  setupPullForward();
  initFirebase();
})();

/* ---- ensure Lucide icons render once the library is ready ---- */
window.addEventListener('load', function(){ if(window.lucide) lucide.createIcons(); });

/* ---- PWA: register service worker (offline + installable + auto-update) ---- */
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
</script>
